name: Deploy Knowledge Base
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: content

      - uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          path: quartz
          ref: v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Copy Content
        run: |
          rm -rf quartz/content/*
          cp -r content/* quartz/content/
          if [ -f content/quartz.config.ts ]; then cp content/quartz.config.ts quartz/quartz.config.ts; fi
          if [ -d content/assets ]; then cp -r content/assets quartz/content/; fi
          if [ -f quartz/content/README.md ] && [ ! -f quartz/content/index.md ]; then
            cp quartz/content/README.md quartz/content/index.md
          fi
          if [ -f content/assets/og-image.png ]; then cp content/assets/og-image.png quartz/quartz/static/og-image.png; fi

      - name: Apply redpill.wiki SEO patches
        run: node content/scripts/patch-quartz-seo.mjs quartz

      - name: Install Dependencies
        working-directory: ./quartz
        run: npm ci

      - name: Build Quartz
        working-directory: ./quartz
        run: npx quartz build

      - name: Patch accessibility output
        run: node content/scripts/patch-quartz-a11y.mjs quartz/public

      - name: Copy SEO static files
        run: |
          if [ -f content/robots.txt ]; then cp content/robots.txt quartz/public/robots.txt; fi
          if [ -f content/llms.txt ]; then cp content/llms.txt quartz/public/llms.txt; fi

      - name: Build native Quartz vault graph page
        run: |
          cat > quartz/content/vault-graph.md <<'EOF'
          ---
          title: "Vault Graph"
          description: "Native Quartz graph visualization for redpill.wiki."
          tags: [meta, graph]
          ---
          # Vault Graph

          Native Quartz graph for redpill.wiki. This page intentionally carries the heavy graph runtime while normal articles stay lightweight.
          EOF
          cp content/scripts/quartz-overrides/quartz.layout.graph.ts quartz/quartz.layout.ts
          (cd quartz && npx quartz build -o graph-public)
          node content/scripts/patch-quartz-a11y.mjs quartz/graph-public
          cp quartz/graph-public/vault-graph.html quartz/public/vault-graph.html
          cp quartz/graph-public/postscript.js quartz/public/vault-graph-postscript.js
          cp quartz/graph-public/index.css quartz/public/vault-graph.css
          cat >> quartz/public/vault-graph.css <<'EOF'
          body:has(.graph) .page { max-width: 100%; }
          body:has(.graph) .center { max-width: min(1500px, 96vw); }
          body:has(.graph) .graph > h3 { font-size: 1.2rem; margin: 0 0 .5rem; }
          body:has(.graph) .graph > .graph-outer { height: min(78vh, 860px); min-height: 560px; }
          body:has(.graph) .graph > .global-graph-outer > .global-graph-container { width: 92vw; height: 86vh; }
          EOF
          node content/scripts/rewrite-native-graph-assets.mjs quartz/public/vault-graph.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
