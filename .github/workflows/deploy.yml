name: Deploy Knowledge Base
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: content

      - uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          path: quartz
          ref: v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Copy Content
        run: |
          rm -rf quartz/content/*
          cp -r content/* quartz/content/
          if [ -f quartz/content/README.md ] && [ ! -f quartz/content/index.md ]; then
            cp quartz/content/README.md quartz/content/index.md
          fi

      - name: Install Dependencies
        working-directory: ./quartz
        run: npm ci

      - name: Build Quartz
        working-directory: ./quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4